name: Coverage

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

jobs:
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Client Coverage
        run: yarn workspace @balneabilidade/client test:coverage

      - name: Server Coverage
        run: yarn workspace @balneabilidade/server test:coverage

      - name: Upload Client Coverage to Codecov
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: ./packages/client/coverage/coverage-final.json
          flags: client
          name: client-coverage
          fail_ci_if_error: false

      - name: Upload Server Coverage to Codecov
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: ./packages/server/coverage/coverage-final.json
          flags: server
          name: server-coverage
          fail_ci_if_error: false

      - name: Generate Client Coverage Summary
        if: always()
        run: |
          echo "## Client Coverage Summary" >> $GITHUB_STEP_SUMMARY
          cat packages/client/coverage/coverage.txt >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Generate Server Coverage Summary
        if: always()
        run: |
          echo "## Server Coverage Summary" >> $GITHUB_STEP_SUMMARY
          cat packages/server/coverage/coverage.txt >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Integration Tests
        run: yarn workspace @balneabilidade/server test:integration
