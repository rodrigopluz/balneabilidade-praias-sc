name: Performance Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1' # Run weekly on Monday at 8 AM

jobs:
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Start server
        run: |
          cd packages/server
          yarn dev &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          sleep 10
          curl -f http://localhost:3001/health || exit 1

      - name: Run Performance Benchmark
        run: |
          cd packages/server
          yarn perf:benchmark
        env:
          BASE_URL: http://localhost:3001
          SAMPLES: 50

      - name: Run Load Test
        run: |
          cd packages/server
          yarn perf:load
        env:
          BASE_URL: http://localhost:3001
          DURATION: 5000
          CONNECTIONS: 5

      - name: Check for k6
        id: check-k6
        run: |
          if command -v k6 &> /dev/null; then
            echo "k6_available=true" >> $GITHUB_OUTPUT
          else
            echo "k6_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Run k6 Load Test
        if: steps.check-k6.outputs.k6_available == 'true'
        run: |
          cd packages/server
          k6 run performance/load-test.js
        env:
          BASE_URL: http://localhost:3001

      - name: Cleanup
        if: always()
        run: |
          pkill -f "tsx watch" || true
