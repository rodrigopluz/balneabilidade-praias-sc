name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PHP_VERSION: '8.2'
  NODE_VERSION: '20'

jobs:
  lint-php:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: curl, json, dom, mbstring
          coverage: none

      - name: Run PHP lint
        run: |
          find . -name "*.php" -exec php -l {} \; 2>&1 | grep -v "No syntax errors"

      - name: Check code style
        run: |
          if command -v phpcs &> /dev/null; then
            phpcs --standard=PSR12 --ignore=vendor --warning-severity=0 .
          else
            echo "PHP CodeSniffer not installed, skipping..."
          fi

  lint-js:
    name: JavaScript Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            ../vite-react/package-lock.json
            ../vite-react/packages/client/package-lock.json

      - name: Install ESLint
        run: |
          npm install -g eslint

      - name: Run ESLint
        run: |
          find assets/js -name "*.js" -exec npx eslint {} \;

  test-php:
    name: PHP Tests
    runs-on: ubuntu-latest
    needs: lint-php
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: curl, json, dom, mbstring

      - name: Test API endpoint
        run: |
          php -S localhost:8080 -t . > /dev/null 2>&1 &
          sleep 2
          curl -X POST -d "municipio=2" http://localhost:8080/ima.php | grep -q "error\|Ponto\|Balneario"
          kill %1 2>/dev/null || true

  validate-html:
    name: HTML Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install HTML validator
        run: pip install html5validator

      - name: Validate HTML
        run: |
          html5validator --ignore 'Missing "charset" meta element' index.html

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: validate-html
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Run Lighthouse
        run: |
          npm install -g @lhci/cli
          php -S localhost:8080 -t . > /dev/null 2>&1 &
          sleep 3
          lhci autorun --collect.url=http://localhost:8080/index.html || true
          kill %1 2>/dev/null || true

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [test-php, validate-html]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://balneabilidade-praias-sc.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via RSYNC
        uses: burnett01/rsync-deployments@5.2
        with:
          switches: -avzr --delete
          remote_path: /var/www/html/balneabilidade-praias-sc/bootstrap
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer, phpmd

      - name: Run security checks
        run: |
          if command -v phpmd &> /dev/null; then
            find . -name "*.php" -exec phpmd {} text unusedcode,naming,controversial \;
          fi

      - name: Check for sensitive data
        run: |
          if grep -r "password\|secret\|api_key" --include="*.php" --include="*.js" . 2>/dev/null; then
            echo "WARNING: Potential sensitive data found!"
          else
            echo "No sensitive data patterns detected."
          fi
